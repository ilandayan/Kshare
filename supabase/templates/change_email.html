<h2>Changement d'adresse email</h2>
<p>Bonjour,</p>
<p>Vous avez demandé à modifier votre adresse email sur Kshare.</p>
<p>Cliquez sur le lien ci-dessous pour confirmer cette modification :</p>
<p><a href="{{ .SiteURL }}/auth/confirm?token_hash={{ .TokenHash }}&type=email_change">Confirmer ma nouvelle adresse</a></p>
<p>Si vous n'êtes pas à l'origine de cette demande, ignorez cet email.</p>
<p>À bientôt sur Kshare !</p>
